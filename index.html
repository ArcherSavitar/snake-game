<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>贪吃蛇</title>
<style>
:root{--bg:#111;--fg:#eee;--p:#2d7ef7;--s:#444;--sidebar-width:120px}*{box-sizing:border-box}
body{margin:0;width:100vw;height:100vh;overflow:hidden;color:var(--fg);background:var(--bg);font-family:system-ui,"Segoe UI",Arial,sans-serif;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:16px;padding:16px;touch-action:none}
#sidebar{width:var(--sidebar-width);display:flex;flex-direction:column;gap:16px;align-items:center;flex-shrink:0;z-index:10}
#score-panel{font-size:18px;font-weight:600;padding:8px}
#button-panel{display:flex;flex-direction:column;gap:10px;width:100%;align-items:center}
button{padding:12px 16px;border:0;border-radius:8px;background:var(--p);color:#fff;cursor:pointer;font-size:14px;min-width:44px;min-height:44px;transition:opacity .3s,transform .2s,background .2s}button:hover{transform:scale(1.02)}button:active{transform:scale(.98)}button.secondary{background:var(--s)}
.hidden{opacity:0;pointer-events:none;position:absolute;transform:translateY(-10px)}
#game-container{position:relative;flex:1;height:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;max-width:calc(100% - var(--sidebar-width) - 32px)}
canvas{background:#000;border:1px solid #333;max-width:100%;max-height:100%;box-shadow:0 0 20px rgba(0,0,0,.5)}
#controls{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%);width:190px;height:190px;display:none;z-index:20}
@media (pointer:coarse){#controls{display:block}}
@media (orientation:landscape) and (max-height:500px){body{padding:0 20px;gap:20px}#sidebar{width:100px;gap:10px}#game-container{max-width:calc(100% - 100px - 40px)}#controls{transform:translateY(50%) scale(.85);bottom:50%;left:auto;right:calc(20px + env(safe-area-inset-right,0px))}}
@media (max-width:600px){body{flex-direction:column;padding:12px;gap:12px}#sidebar{width:100%;flex-direction:row;justify-content:space-between;align-items:center;gap:8px}#score-panel{font-size:16px;padding:4px}#button-panel{flex-direction:row;gap:8px}button{padding:10px 14px;font-size:13px;min-height:40px}#game-container{max-width:100%;flex:1;width:100%}#controls{bottom:calc(10px + env(safe-area-inset-bottom,0px))}}
.d-pad-btn{position:absolute;width:62px;height:62px;min-width:44px;min-height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);font-size:30px;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;transition:transform .08s,background .08s}
.d-pad-btn:active,.d-pad-btn.active{background:rgba(255,255,255,.3);transform:scale(.92)}
.btn-up{top:0;left:64px}.btn-down{bottom:0;left:64px}.btn-left{top:64px;left:0}.btn-right{top:64px;right:0}
</style>
</head>
<body>
<div id="sidebar">
  <div id="score-panel">得分: <span id="score">0</span></div>
  <div id="button-panel">
    <button id="start">开始游戏</button>
    <button id="pause" class="hidden">暂停游戏</button>
    <button id="end" class="hidden secondary">结束游戏</button>
  </div>
</div>
<div id="game-container"><canvas id="game" tabindex="0" style="outline:none"></canvas></div>
<div id="controls">
  <div class="d-pad-btn btn-up" data-k="ArrowUp">↑</div>
  <div class="d-pad-btn btn-left" data-k="ArrowLeft">←</div>
  <div class="d-pad-btn btn-right" data-k="ArrowRight">→</div>
  <div class="d-pad-btn btn-down" data-k="ArrowDown">↓</div>
</div>
<script>
const T={s:"开始游戏",r:"运行中",p:"暂停游戏",c:"继续",g:"游戏结束",e:"结束游戏"};
const SCALE=0.85;
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),scoreEl=document.getElementById("score"),startBtn=document.getElementById("start"),pauseBtn=document.getElementById("pause"),endBtn=document.getElementById("end"),controls=document.getElementById("controls"),gameContainer=document.getElementById("game-container");
let cellSize=20,cols=20,rows=20,snake=[],dir={x:1,y:0},nextDir={x:1,y:0},food=null,score=0,started=false,paused=false,speed=120,timerId=null,gameState="initial";
let debounceTimer=null;
const debounce=(fn,delay)=>{clearTimeout(debounceTimer);debounceTimer=setTimeout(fn,delay)};
const showButtons=(state)=>{debounce(()=>{if(state==="initial"){startBtn.classList.remove("hidden");pauseBtn.classList.add("hidden");endBtn.classList.add("hidden")}else if(state==="running"){startBtn.classList.add("hidden");pauseBtn.classList.remove("hidden");pauseBtn.textContent=T.p;endBtn.classList.remove("hidden")}else if(state==="paused"){startBtn.classList.add("hidden");pauseBtn.classList.remove("hidden");pauseBtn.textContent=T.c;endBtn.classList.remove("hidden")}},100)};
const randomCell=()=>({x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)});
function placeFood(){do{food=randomCell()}while(snake.some((s)=>s.x===food.x&&s.y===food.y))}
function drawCell(x,y,color){ctx.fillStyle=color;ctx.fillRect(x*cellSize,y*cellSize,cellSize-1,cellSize-1)}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);if(!food||snake.length===0)return;drawCell(food.x,food.y,"#e74c3c");snake.forEach((p,i)=>drawCell(p.x,p.y,i===0?"#2ecc71":"#27ae60"))}
function reset(drawNow=true){snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}];dir={x:1,y:0};nextDir=dir;score=0;speed=120;paused=false;started=false;gameState="initial";placeFood();scoreEl.textContent="0";showButtons("initial");if(drawNow)draw()}
function stop(gameOver=false){if(timerId){clearTimeout(timerId);timerId=null}started=false;if(gameOver){ctx.fillStyle="white";ctx.font="30px Arial";ctx.textAlign="center";ctx.fillText(T.g,canvas.width/2,canvas.height/2)}}
function step(){dir=nextDir;const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};const hitWall=head.x<0||head.y<0||head.x>=cols||head.y>=rows;const hitBody=snake.some((p)=>p.x===head.x&&p.y===head.y);if(hitWall||hitBody){stop(true);return}snake.unshift(head);if(head.x===food.x&&head.y===food.y){score+=10;scoreEl.textContent=String(score);placeFood();if(speed>60)speed-=4}else{snake.pop()}draw()}
function scheduleStep(){timerId=setTimeout(()=>{step();if(started&&!paused)scheduleStep()},speed)}
function startGame(){if(started)return;started=true;paused=false;gameState="running";showButtons("running");scheduleStep();canvas.focus()}
function togglePause(){if(!started)return;paused=!paused;gameState=paused?"paused":"running";showButtons(gameState);if(!paused&&!timerId)scheduleStep()}
function endGame(){stop();reset()}
function setDir(nx,ny){const nd={x:nx,y:ny};if(snake.length>1&&snake[1].x===snake[0].x+nd.x&&snake[1].y===snake[0].y+nd.y)return;nextDir=nd}
function handleInput(k){if(k==="ArrowUp"||k==="w")setDir(0,-1);else if(k==="ArrowDown"||k==="s")setDir(0,1);else if(k==="ArrowLeft"||k==="a")setDir(-1,0);else if(k==="ArrowRight"||k==="d")setDir(1,0);else if(k===" ")togglePause()}
function resizeGame(){const rawW=gameContainer.clientWidth,rawH=gameContainer.clientHeight;const target=Math.min(rawW,rawH)<400?15:20;const w=rawW*SCALE,h=rawH*SCALE;cols=Math.max(10,Math.floor(w/target));rows=Math.max(10,Math.floor(h/target));cellSize=target;canvas.width=cols*cellSize;canvas.height=rows*cellSize;if(!started)reset(false);draw()}
document.addEventListener("keydown",(e)=>{if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key))e.preventDefault();handleInput(e.key)});
controls.addEventListener("click",(e)=>{const k=e.target.closest(".d-pad-btn")?.dataset.k;if(k)handleInput(k)});
controls.addEventListener("touchstart",(e)=>{e.preventDefault();const t=e.target.closest(".d-pad-btn");if(!t)return;t.classList.add("active");handleInput(t.dataset.k)},{passive:false});
controls.addEventListener("touchend",(e)=>{const t=e.target.closest(".d-pad-btn");if(t)t.classList.remove("active")});
startBtn.addEventListener("click",()=>startGame());
pauseBtn.addEventListener("click",()=>togglePause());
endBtn.addEventListener("click",()=>endGame());
window.addEventListener("resize",()=>{resizeGame();canvas.focus()});
resizeGame();reset();canvas.focus();
</script>
</body>
</html>
