<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>贪吃蛇</title>
<style>
:root{--bg:#111;--fg:#eee;--p:#2d7ef7;--s:#444;--sidebar-width:90px;--dpad-size:52px;--dpad-gap:4px}*{box-sizing:border-box}
body{margin:0;width:100vw;height:100vh;overflow:hidden;color:var(--fg);background:var(--bg);font-family:system-ui,"Segoe UI",Arial,sans-serif;display:block;padding:0;touch-action:none;position:relative}
#game-wrapper{position:absolute;top:0;left:0;width:calc(100% - var(--sidebar-width));height:100vh;display:flex;align-items:center;justify-content:center}
canvas{background:#000;border:1px solid #333;box-shadow:0 0 20px rgba(0,0,0,.5);max-width:100%;max-height:100%}
#sidebar{position:fixed;right:0;top:0;width:var(--sidebar-width);height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding-top:20px;gap:20px;z-index:30;background:rgba(17,17,17,.95)}
#score-panel{font-size:16px;font-weight:600}
#button-panel{display:flex;flex-direction:column;gap:8px;width:80px}
button{padding:10px 8px;border:0;border-radius:6px;background:var(--p);color:#fff;cursor:pointer;font-size:13px;min-width:44px;min-height:44px;transition:opacity .3s,transform .2s;width:100%}button:active{transform:scale(.96)}button.secondary{background:var(--s)}
.hidden{opacity:0;pointer-events:none;position:absolute;width:1px;height:1px;overflow:hidden}
#controls{position:fixed;left:50%;bottom:calc(20px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);width:calc(var(--dpad-size)*3 + var(--dpad-gap)*2);height:calc(var(--dpad-size)*3 + var(--dpad-gap)*2);display:none;z-index:25}
@media (pointer:coarse){body{padding:0}#controls{display:flex;flex-wrap:wrap;align-items:center;justify-content:center}}
@media (max-width:500px){
  :root{--sidebar-width:70px;--dpad-size:48px}
  #sidebar{padding-top:12px;gap:12px;width:var(--sidebar-width)}
  #score-panel{font-size:14px}
  #button-panel{width:60px;gap:6px}
  button{padding:8px 6px;font-size:11px;min-height:36px}
}
@media (orientation:landscape) and (max-height:500px){
  #game-wrapper{width:calc(100% - 80px)}
  #sidebar{width:80px;padding-top:8px;gap:8px}
  #score-panel{font-size:13px}
  #button-panel{width:60px;gap:4px}
  button{padding:6px 4px;font-size:10px;min-height:32px}
  #controls{left:auto;right:calc(10px + env(safe-area-inset-right,0px));transform:translateY(-50%);bottom:50%;width:calc(var(--dpad-size)*2 + var(--dpad-gap));height:calc(var(--dpad-size)*3 + var(--dpad-gap)*2)}
}
.d-pad-btn{width:var(--dpad-size);height:var(--dpad-size);min-width:44px;min-height:44px;border-radius:50%;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);font-size:22px;display:flex;align-items:center;justify-content:center;user-select:none;-webkit-tap-highlight-color:transparent;transition:transform .08s,background .08s}
.d-pad-btn:active,.d-pad-btn.active{background:rgba(255,255,255,.3);transform:scale(.92)}
#controls .btn-up{order:1;margin:var(--dpad-gap)}
#controls .btn-left{order:2;margin:var(--dpad-gap)}
#controls .btn-right{order:3;margin:var(--dpad-gap)}
#controls .btn-down{order:4;margin:var(--dpad-gap)}
</style>
</head>
<body>
<div id="game-wrapper"><canvas id="game" tabindex="0" style="outline:none"></canvas></div>
<div id="sidebar">
  <div id="score-panel">得分: <span id="score">0</span></div>
  <div id="button-panel">
    <button id="start">开始</button>
    <button id="pause" class="hidden">暂停</button>
    <button id="end" class="hidden secondary">结束</button>
  </div>
</div>
<div id="controls">
  <div class="d-pad-btn btn-up" data-k="ArrowUp">↑</div>
  <div class="d-pad-btn btn-left" data-k="ArrowLeft">←</div>
  <div class="d-pad-btn btn-right" data-k="ArrowRight">→</div>
  <div class="d-pad-btn btn-down" data-k="ArrowDown">↓</div>
</div>
<script>
const T={s:"开始",r:"运行中",p:"暂停",c:"继续",g:"游戏结束",e:"结束"};
const SCALE=0.85;
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d"),scoreEl=document.getElementById("score"),startBtn=document.getElementById("start"),pauseBtn=document.getElementById("pause"),endBtn=document.getElementById("end"),controls=document.getElementById("controls"),gameWrapper=document.getElementById("game-wrapper");
let cellSize=20,cols=20,rows=20,snake=[],dir={x:1,y:0},nextDir={x:1,y:0},food=null,score=0,started=false,paused=false,speed=120,timerId=null,gameState="initial";
let debounceTimer=null;
const debounce=(fn,delay)=>{clearTimeout(debounceTimer);debounceTimer=setTimeout(fn,delay)};
const showButtons=(state)=>{debounce(()=>{if(state==="initial"){startBtn.classList.remove("hidden");pauseBtn.classList.add("hidden");endBtn.classList.add("hidden")}else if(state==="running"){startBtn.classList.add("hidden");pauseBtn.classList.remove("hidden");pauseBtn.textContent=T.p;endBtn.classList.remove("hidden")}else if(state==="paused"){startBtn.classList.add("hidden");pauseBtn.classList.remove("hidden");pauseBtn.textContent=T.c;endBtn.classList.remove("hidden")}},100)};
const randomCell=()=>({x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)});
function placeFood(){do{food=randomCell()}while(snake.some((s)=>s.x===food.x&&s.y===food.y))}
function drawCell(x,y,color){ctx.fillStyle=color;ctx.fillRect(x*cellSize,y*cellSize,cellSize-1,cellSize-1)}
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);if(!food||snake.length===0)return;drawCell(food.x,food.y,"#e74c3c");snake.forEach((p,i)=>drawCell(p.x,p.y,i===0?"#2ecc71":"#27ae60"))}
function reset(drawNow=true){snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}];dir={x:1,y:0};nextDir=dir;score=0;speed=120;paused=false;started=false;gameState="initial";placeFood();scoreEl.textContent="0";showButtons("initial");if(drawNow)draw()}
function stop(gameOver=false){if(timerId){clearTimeout(timerId);timerId=null}started=false;if(gameOver){ctx.fillStyle="white";ctx.font="24px Arial";ctx.textAlign="center";ctx.fillText(T.g,canvas.width/2,canvas.height/2)}}
function step(){dir=nextDir;const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};const hitWall=head.x<0||head.y<0||head.x>=cols||head.y>=rows;const hitBody=snake.some((p)=>p.x===head.x&&p.y===head.y);if(hitWall||hitBody){stop(true);return}snake.unshift(head);if(head.x===food.x&&head.y===food.y){score+=10;scoreEl.textContent=String(score);placeFood();if(speed>60)speed-=4}else{snake.pop()}draw()}
function scheduleStep(){timerId=setTimeout(()=>{step();if(started&&!paused)scheduleStep()},speed)}
function startGame(){if(started)return;started=true;paused=false;gameState="running";showButtons("running");scheduleStep();canvas.focus()}
function togglePause(){if(!started)return;paused=!paused;gameState=paused?"paused":"running";showButtons(gameState);if(!paused&&!timerId)scheduleStep()}
function endGame(){stop();reset()}
function setDir(nx,ny){const nd={x:nx,y:ny};if(snake.length>1&&snake[1].x===snake[0].x+nd.x&&snake[1].y===snake[0].y+nd.y)return;nextDir=nd}
function handleInput(k){if(k==="ArrowUp"||k==="w")setDir(0,-1);else if(k==="ArrowDown"||k==="s")setDir(0,1);else if(k==="ArrowLeft"||k==="a")setDir(-1,0);else if(k==="ArrowRight"||k==="d")setDir(1,0);else if(k===" ")togglePause()}
function resizeGame(){const gw=gameWrapper.clientWidth,gh=gameWrapper.clientHeight;const target=Math.min(gw,gh)<300?10:20;const w=gw*SCALE,h=gh*SCALE;cols=Math.max(8,Math.floor(w/target));rows=Math.max(8,Math.floor(h/target));cellSize=target;canvas.width=cols*cellSize;canvas.height=rows*cellSize;if(!started)reset(false);draw()}
document.addEventListener("keydown",(e)=>{if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key))e.preventDefault();handleInput(e.key)});
controls.addEventListener("click",(e)=>{const k=e.target.closest(".d-pad-btn")?.dataset.k;if(k)handleInput(k)});
controls.addEventListener("touchstart",(e)=>{e.preventDefault();const t=e.target.closest(".d-pad-btn");if(!t)return;t.classList.add("active");handleInput(t.dataset.k)},{passive:false});
controls.addEventListener("touchend",(e)=>{const t=e.target.closest(".d-pad-btn");if(t)t.classList.remove("active")});
startBtn.addEventListener("click",()=>startGame());
pauseBtn.addEventListener("click",()=>togglePause());
endBtn.addEventListener("click",()=>endGame());
window.addEventListener("resize",()=>{resizeGame();canvas.focus()});
resizeGame();reset();canvas.focus();
</script>
</body>
</html>
