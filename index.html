<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>贪吃蛇</title>
<style>
body{
  font-family:system-ui,Segoe UI,Arial;margin:0;background:#111;color:#eee;
  display:flex;flex-direction:column;align-items:center;gap:12px;
  touch-action:none;overflow:hidden;height:100vh;width:100vw;
  box-sizing:border-box;
}
header{padding:12px 0;font-weight:600;flex-shrink:0}
#hud{display:flex;gap:16px;align-items:center;flex-shrink:0;z-index:10}
button{padding:8px 12px;border:0;border-radius:6px;background:#2d7ef7;color:#fff;cursor:pointer}
button.secondary{background:#444}
/* 游戏容器，用于自适应布局 */
#game-container {
  position: relative;
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  height: 100%;
  overflow: hidden;
}
canvas{background:#000;border:1px solid #333;max-width:98%;max-height:98%;box-shadow:0 0 20px rgba(0,0,0,0.5)}
#controls{
  position:relative;
  width:190px;height:190px;
  display:none;
  z-index:20;
  flex-shrink:0;
}
@media (pointer:coarse){#controls{display:block}}
/* 横屏适配 */
@media (orientation: landscape) and (max-height: 500px) {
  body { flex-direction: row; padding: 0 20px; gap: 20px; }
  header { display: none; }
  #hud { flex-direction: column; align-items: flex-start; gap: 10px; }
  #game-container { flex: 1; height: 100%; }
  #controls { transform: scale(0.85); }
}
.d-pad-btn {
  position: absolute;
  width: 62px;
  height: 62px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: rgba(255,255,255,0.8);
  display: flex;
  justify-content: center;
  align-items: center;
  user-select: none;
  backdrop-filter: blur(4px);
  font-size: 30px;
  -webkit-tap-highlight-color: transparent;
  transition: transform 0.1s, background 0.1s;
}
.d-pad-btn:active, .d-pad-btn.active {
  background: rgba(255, 255, 255, 0.3);
  transform: scale(0.92);
}
.btn-up { top: 0; left: 64px; }
.btn-down { bottom: 0; left: 64px; }
.btn-left { top: 64px; left: 0; }
.btn-right { top: 64px; right: 0; }
</style>
</head>
<body>
<header>贪吃蛇</header>
<div id="hud">
  <div>得分: <span id="score">0</span></div>
  <button id="start">开始</button>
  <button id="pause" class="secondary">暂停</button>
  <button id="restart" class="secondary">重开</button>
</div>
<div id="game-container">
  <canvas id="game" tabindex="0" style="outline:none"></canvas>
</div>
<div id="controls">
  <div class="d-pad-btn btn-up" data-k="ArrowUp">↑</div>
  <div class="d-pad-btn btn-left" data-k="ArrowLeft">←</div>
  <div class="d-pad-btn btn-right" data-k="ArrowRight">→</div>
  <div class="d-pad-btn btn-down" data-k="ArrowDown">↓</div>
</div>
<script>
const c=document.getElementById("game");
c.focus();
const ctx=c.getContext("2d");
const scoreEl=document.getElementById("score");
const startBtn=document.getElementById("start");
const pauseBtn=document.getElementById("pause");
const restartBtn=document.getElementById("restart");
const controls=document.getElementById("controls");
const gameContainer=document.getElementById("game-container");
let size=20;
let cols,rows;

// 初始化画布尺寸
function resizeGame() {
  const containerWidth = gameContainer.clientWidth;
  const containerHeight = gameContainer.clientHeight;
  
  // 计算最大可用的正方形尺寸，或者保持 400x400 的比例
  // 这里我们采用自适应格子数量，保证满屏
  // 也可以选择固定格子数，缩放画布
  
  // 方案：保持格子大小相对固定，改变行列数（视野变大）
  // 或者：固定行列数，改变格子大小（视野缩放）
  
  // 采用：自适应行列数，使游戏填满区域，每格约20px
  // 确保是偶数以便居中
  const targetSize = Math.min(containerWidth, containerHeight) < 400 ? 15 : 20;
  
  // 计算能容纳的行列数
  cols = Math.floor(containerWidth / targetSize);
  rows = Math.floor(containerHeight / targetSize);
  
  // 调整画布实际像素
  c.width = cols * targetSize;
  c.height = rows * targetSize;
  
  // 更新全局 size 变量
  size = targetSize;
  
  // 如果游戏未开始或已结束，重置位置到中心
  if (!started && !snake) {
     reset(false); // 仅重置数据不重绘
  }
  
  draw();
}

// 监听窗口大小变化
window.addEventListener('resize', () => {
  resizeGame();
  // 重新聚焦，防止布局变化导致失焦
  c.focus();
});

let snake,dir,nextDir,food,score,loopId,paused,started,speed;
function rndCell(){return {x:Math.floor(Math.random()*cols),y:Math.floor(Math.random()*rows)}}
function placeFood(){
 do{food=rndCell()}while(snake.some(s=>s.x===food.x&&s.y===food.y))
}
function reset(shouldDraw=true){
 snake=[{x:Math.floor(cols/2),y:Math.floor(rows/2)}];
 dir={x:1,y:0};
 nextDir=dir;
 score=0;
 speed=120;
 paused=false;
 started=false;
 placeFood();
 updateScore();
 if(shouldDraw) draw();
}
function updateScore(){scoreEl.textContent=String(score)}
function drawCell(x,y,color){
 ctx.fillStyle=color;
 ctx.fillRect(x*size,y*size,size-1,size-1);
}
function draw(){
 ctx.clearRect(0,0,c.width,c.height);
 if(!food || !snake) return;
 drawCell(food.x,food.y,"#e74c3c");
 for(let i=0;i<snake.length;i++){
 drawCell(snake[i].x,snake[i].y,i===0?"#2ecc71":"#27ae60");
 }
}
function step(){
 if(paused) return;
 dir=nextDir;
 const head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};
 if(head.x<0||head.y<0||head.x>=cols||head.y>=rows||snake.some(s=>s.x===head.x&&s.y===head.y)){stop(true);return}
 snake.unshift(head);
 if(head.x===food.x&&head.y===food.y){score+=10;updateScore();placeFood();if(speed>60) speed-=4}else{snake.pop()}
 draw();
}
function start(){
 if(started) return;
 started=true;
 paused=false;
 loopId=setInterval(step,speed);
 c.focus();
}
function stop(gameOver=false){
 if(loopId){clearInterval(loopId);loopId=null}
 started=false;
 if(gameOver){
   ctx.fillStyle="white";
   ctx.font="30px Arial";
   ctx.textAlign="center";
   ctx.fillText("游戏结束",c.width/2,c.height/2);
   startBtn.textContent="重新开始";
 } else {
   startBtn.textContent="开始";
 }
}
function pause(){
 if(!started) return;
 paused=!paused;
 pauseBtn.textContent=paused?"继续":"暂停";
}
function setDir(nx,ny){
 const nd={x:nx,y:ny};
 if(snake.length>1&&snake[1].x===snake[0].x+nd.x&&snake[1].y===snake[0].y+nd.y) return;
 nextDir=nd;
}
document.addEventListener("keydown",e=>{
 if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].includes(e.key)) e.preventDefault();
 if(e.key==="ArrowUp"||e.key==="w") setDir(0,-1);
 else if(e.key==="ArrowDown"||e.key==="s") setDir(0,1);
 else if(e.key==="ArrowLeft"||e.key==="a") setDir(-1,0);
 else if(e.key==="ArrowRight"||e.key==="d") setDir(1,0);
 else if(e.key===" ") pause();
});
controls.addEventListener("click",e=>{
 const k=e.target.closest(".d-pad-btn")?.dataset.k;
 if(!k) return;
 handleInput(k);
});
controls.addEventListener("touchstart",e=>{
 e.preventDefault(); // 阻止滚动和模拟鼠标事件
 const t=e.target.closest(".d-pad-btn");
 if(!t) return;
 t.classList.add("active");
 handleInput(t.dataset.k);
},{passive:false});
controls.addEventListener("touchend",e=>{
 const t=e.target.closest(".d-pad-btn");
 if(t) t.classList.remove("active");
});
function handleInput(k){
 if(k==="ArrowUp") setDir(0,-1);
 else if(k==="ArrowDown") setDir(0,1);
 else if(k==="ArrowLeft") setDir(-1,0);
 else if(k==="ArrowRight") setDir(1,0);
}
startBtn.addEventListener("click",()=>{
 if(startBtn.textContent==="重新开始") reset();
 if(!started){start();startBtn.textContent="运行中"}});
pauseBtn.addEventListener("click",()=>pause());
restartBtn.addEventListener("click",()=>{stop();reset();startBtn.textContent="开始";pauseBtn.textContent="暂停"});
// 初始化
resizeGame();
reset();
</script>
</body>
</html>
